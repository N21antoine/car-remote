<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Car Remote</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1 {
      color: #ffffff;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    #status {
      color: #888;
      font-size: 14px;
      margin-bottom: 40px;
      text-align: center;
    }

    #status.connected { color: #4ade80; }
    #status.error     { color: #f87171; }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 300px;
    }

    button {
      width: 100%;
      padding: 22px;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    button:active {
      transform: scale(0.96);
      opacity: 0.85;
    }

    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    #btnConnect  { background: #2563eb; color: white; margin-bottom: 10px; }
    #btnLock     { background: #dc2626; color: white; }
    #btnUnlock   { background: #16a34a; color: white; }
    #btnClimate  { background: #d97706; color: white; }
    #btnLocate   { background: #7c3aed; color: white; }
    #btnValet    { background: #0f766e; color: white; }

    #feedback {
      margin-top: 24px;
      color: #888;
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }

    #countdown {
      display: none;
      margin-top: 12px;
      font-size: 13px;
      color: #f87171;
      text-align: center;
    }

    #countdownBar {
      display: none;
      margin-top: 8px;
      width: 100%;
      max-width: 300px;
      height: 6px;
      background: #1e293b;
      border-radius: 999px;
      overflow: hidden;
    }

    #countdownFill {
      height: 100%;
      width: 100%;
      background: #f87171;
      border-radius: 999px;
      transition: width 1s linear;
    }

    #mapLink {
      display: none;
      margin-top: 16px;
      padding: 14px 24px;
      background: #1e293b;
      border-radius: 12px;
      color: #60a5fa;
      font-size: 15px;
      text-align: center;
      text-decoration: none;
      width: 100%;
      max-width: 300px;
    }
  </style>
</head>
<body>

  <h1>🚗 Car Remote</h1>
  <div id="status">Not connected</div>

  <div class="buttons">
    <button id="btnConnect" onclick="connect()">🔵 Connect</button>
    <button id="btnLock"    onclick="send('LOCK')"    disabled>🔒 Lock</button>
    <button id="btnUnlock"  onclick="send('UNLOCK')"  disabled>🔓 Unlock</button>
    <button id="btnClimate" onclick="send('CLIMATE')" disabled>❄️ Climate</button>
    <button id="btnLocate"  onclick="send('WHERE')"   disabled>📍 Locate Car</button>
    <button id="btnValet"   onclick="toggleValet()"   disabled>🅿️ Valet Mode: OFF</button>
  </div>

  <div id="feedback"></div>
  <div id="countdown"></div>
  <div id="countdownBar"><div id="countdownFill"></div></div>
  <a id="mapLink" target="_blank">📌 Open car location in Google Maps</a>

<script>
  const SERVICE_UUID        = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
  const CHARACTERISTIC_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
  const NOTIFY_UUID         = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';
  const RELOCK_SECONDS      = 30;

  let characteristic  = null;
  let valetOn         = false;
  let countdownInterval = null;

  function setStatus(msg, cls = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = cls;
  }

  function setFeedback(msg) {
    document.getElementById('feedback').textContent = msg;
  }

  function setButtons(enabled) {
    ['btnLock', 'btnUnlock', 'btnClimate', 'btnLocate', 'btnValet'].forEach(id => {
      document.getElementById(id).disabled = !enabled;
    });
  }

  function showMapLink(lat, lng) {
    const link = document.getElementById('mapLink');
    link.style.display = 'block';
    link.href = `https://www.google.com/maps?q=${lat},${lng}`;
  }

  function startCountdown() {
    stopCountdown();
    let remaining = RELOCK_SECONDS;

    const countdownEl  = document.getElementById('countdown');
    const barEl        = document.getElementById('countdownBar');
    const fillEl       = document.getElementById('countdownFill');

    countdownEl.style.display = 'block';
    barEl.style.display       = 'block';
    fillEl.style.width        = '100%';

    countdownEl.textContent = `Auto-locking in ${remaining}s`;

    countdownInterval = setInterval(() => {
      remaining--;
      const pct = (remaining / RELOCK_SECONDS) * 100;
      fillEl.style.width = pct + '%';
      countdownEl.textContent = `Auto-locking in ${remaining}s`;

      if (remaining <= 0) stopCountdown();
    }, 1000);
  }

  function stopCountdown() {
    if (countdownInterval) {
      clearInterval(countdownInterval);
      countdownInterval = null;
    }
    document.getElementById('countdown').style.display  = 'none';
    document.getElementById('countdownBar').style.display = 'none';
    document.getElementById('countdownFill').style.width  = '100%';
  }

  function handleNotification(event) {
    const decoder = new TextDecoder();
    const msg = decoder.decode(event.target.value);
    console.log('BLE notification:', msg);

    if (msg.startsWith('ACK:')) {
      const cmd = msg.replace('ACK:', '');

      const labels = {
        'UNLOCK':    '🔓 Unlocked ✓',
        'LOCK':      '🔒 Locked ✓',
        'CLIMATE':   '❄️ Climate started ✓',
        'WHERE':     '📍 Location requested ✓',
        'VALET ON':  '🅿️ Valet mode ON ✓',
        'VALET OFF': '🅿️ Valet mode OFF ✓',
        'AUTO-LOCK': '🔒 Auto-locked ✓'
      };

      setFeedback(labels[cmd] || cmd + ' ✓');

      if (cmd === 'UNLOCK')    startCountdown();
      if (cmd === 'LOCK')      stopCountdown();
      if (cmd === 'AUTO-LOCK') stopCountdown();
    }

    else if (msg.startsWith('GPS:')) {
      if (msg === 'GPS:NOFIX') {
        setFeedback('No GPS fix yet — try again in a moment');
      } else {
        const coords = msg.replace('GPS:', '').split(',');
        if (coords.length === 2) {
          const lat = parseFloat(coords[0]);
          const lng = parseFloat(coords[1]);
          if (!isNaN(lat) && !isNaN(lng)) {
            setFeedback('Car located ✓');
            showMapLink(lat, lng);
          }
        }
      }
    }
  }

  function toggleValet() {
    valetOn = !valetOn;
    const btn = document.getElementById('btnValet');
    if (valetOn) {
      send('VALET ON');
      btn.textContent       = '🅿️ Valet Mode: ON';
      btn.style.background  = '#b45309';
    } else {
      send('VALET OFF');
      btn.textContent       = '🅿️ Valet Mode: OFF';
      btn.style.background  = '#0f766e';
    }
  }

  async function connect() {
    try {
      setStatus('Scanning...', '');
      const device = await navigator.bluetooth.requestDevice({
        filters: [{ name: 'CarRemote' }],
        optionalServices: [SERVICE_UUID]
      });

      setStatus('Connecting...', '');
      const server  = await device.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);

      characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

      const notifyChar = await service.getCharacteristic(NOTIFY_UUID);
      await notifyChar.startNotifications();
      notifyChar.addEventListener('characteristicvaluechanged', handleNotification);

      setStatus('Connected ✓', 'connected');
      setButtons(true);
      document.getElementById('btnConnect').textContent = '🔵 Reconnect';

      device.addEventListener('gattserverdisconnected', () => {
        setStatus('Disconnected', 'error');
        setButtons(false);
        characteristic = null;
        stopCountdown();
      });

    } catch (err) {
      setStatus('Connection failed', 'error');
      console.error(err);
    }
  }

  async function send(cmd) {
    if (!characteristic) {
      setFeedback('Not connected');
      return;
    }
    try {
      const encoder = new TextEncoder();
      await characteristic.writeValue(encoder.encode(cmd));
    } catch (err) {
      setFeedback('Failed to send');
      console.error(err);
    }
  }
</script>

</body>
</html>
