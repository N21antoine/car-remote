<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Car Remote</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1 {
      color: #ffffff;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    #status {
      color: #888;
      font-size: 14px;
      margin-bottom: 40px;
      text-align: center;
    }

    #status.connected    { color: #4ade80; }
    #status.error        { color: #f87171; }
    #status.reconnecting { color: #fbbf24; }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 300px;
    }

    button {
      width: 100%;
      padding: 22px;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    button:active {
      transform: scale(0.96);
      opacity: 0.85;
    }

    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    #btnConnect  { background: #2563eb; color: white; margin-bottom: 10px; }
    #btnLock     { background: #dc2626; color: white; }
    #btnUnlock   { background: #16a34a; color: white; }
    #btnClimate  { background: #d97706; color: white; }
    #btnLocate   { background: #7c3aed; color: white; }
    #btnValet    { background: #0f766e; color: white; }

    #feedback {
      margin-top: 24px;
      color: #888;
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }

    #feedback.warning { color: #fbbf24; }

    #countdown {
      display: none;
      margin-top: 12px;
      font-size: 13px;
      color: #f87171;
      text-align: center;
    }

    #countdownBar {
      display: none;
      margin-top: 8px;
      width: 100%;
      max-width: 300px;
      height: 6px;
      background: #1e293b;
      border-radius: 999px;
      overflow: hidden;
    }

    #countdownFill {
      height: 100%;
      width: 100%;
      background: #f87171;
      border-radius: 999px;
      transition: width 1s linear;
    }

    #mapLink {
      display: none;
      margin-top: 16px;
      padding: 14px 24px;
      background: #1e293b;
      border-radius: 12px;
      color: #60a5fa;
      font-size: 15px;
      text-align: center;
      text-decoration: none;
      width: 100%;
      max-width: 300px;
    }

    #debugLog {
      margin-top: 20px;
      width: 100%;
      max-width: 300px;
      background: #0f172a;
      border-radius: 12px;
      padding: 10px;
      font-size: 11px;
      color: #64748b;
      font-family: monospace;
      max-height: 120px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

  <h1>🚗 Clef de char</h1>
  <div id="status">Not connected</div>

  <div class="buttons">
    <button id="btnConnect" onclick="connect()">🔵 Connect</button>
    <button id="btnLock"    onclick="send('LOCK')"    disabled>🔒 Lock</button>
    <button id="btnUnlock"  onclick="send('UNLOCK')"  disabled>🔓 Unlock</button>
    <button id="btnClimate" onclick="send('CLIMATE')" disabled>❄️ Climate</button>
    <button id="btnLocate"  onclick="send('WHERE')"   disabled>📍 Locate Car</button>
    <button id="btnValet"   onclick="toggleValet()"   disabled>🅿️ Valet Mode: OFF</button>
  </div>

  <div id="feedback"></div>
  <div id="countdown"></div>
  <div id="countdownBar"><div id="countdownFill"></div></div>
  <a id="mapLink" target="_blank">📌 Open car location in Google Maps</a>
  <div id="debugLog"></div>

<script>
  const SERVICE_UUID        = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
  const CHARACTERISTIC_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
  const NOTIFY_UUID         = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';
  const RELOCK_SECONDS      = 30;
  const ACK_TIMEOUT_MS      = 5000;
  const KEEPALIVE_MS        = 15000;
  const CRITICAL_CMDS       = ['LOCK','UNLOCK','CLIMATE','VALET ON','VALET OFF'];

  let characteristic      = null;
  let bleDevice           = null;
  let valetOn             = false;
  let countdownInterval   = null;
  let keepaliveInterval   = null;
  let ackTimeout          = null;
  let reconnecting        = false;

  // ── Logging ──────────────────────────────────────────────
  function log(msg) {
    const el   = document.getElementById('debugLog');
    const line = document.createElement('div');
    line.textContent = new Date().toLocaleTimeString() + ' ' + msg;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
    console.log(msg);
  }

  // ── UI helpers ────────────────────────────────────────────
  function setStatus(msg, cls = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = cls;
  }

  function setFeedback(msg, warning = false) {
    const el = document.getElementById('feedback');
    el.textContent = msg;
    el.className = warning ? 'warning' : '';
  }

  function setButtons(enabled) {
    ['btnLock','btnUnlock','btnClimate','btnLocate','btnValet'].forEach(id => {
      document.getElementById(id).disabled = !enabled;
    });
  }

  function showMapLink(lat, lng) {
    const link = document.getElementById('mapLink');
    link.style.display = 'block';
    link.href = `https://www.google.com/maps?q=${lat},${lng}`;
  }

  // ── Countdown ─────────────────────────────────────────────
  function startCountdown() {
    stopCountdown();
    let remaining = RELOCK_SECONDS;

    const countdownEl = document.getElementById('countdown');
    const barEl       = document.getElementById('countdownBar');
    const fillEl      = document.getElementById('countdownFill');

    countdownEl.style.display = 'block';
    barEl.style.display       = 'block';
    fillEl.style.width        = '100%';
    countdownEl.textContent   = `Auto-locking in ${remaining}s`;

    countdownInterval = setInterval(() => {
      remaining--;
      fillEl.style.width      = (remaining / RELOCK_SECONDS * 100) + '%';
      countdownEl.textContent = `Auto-locking in ${remaining}s`;
      if (remaining <= 0) stopCountdown();
    }, 1000);
  }

  function stopCountdown() {
    if (countdownInterval) {
      clearInterval(countdownInterval);
      countdownInterval = null;
    }
    document.getElementById('countdown').style.display    = 'none';
    document.getElementById('countdownBar').style.display = 'none';
    document.getElementById('countdownFill').style.width  = '100%';
  }

  // ── Keepalive ─────────────────────────────────────────────
  function startKeepalive() {
    stopKeepalive();
    keepaliveInterval = setInterval(async () => {
      if (characteristic) {
        try {
          await characteristic.writeValue(new TextEncoder().encode('PING'));
          log('→ PING');
        } catch (err) {
          log('Keepalive error: ' + err.message);
        }
      }
    }, KEEPALIVE_MS);
  }

  function stopKeepalive() {
    if (keepaliveInterval) {
      clearInterval(keepaliveInterval);
      keepaliveInterval = null;
    }
  }

  // ── ACK timeout ───────────────────────────────────────────
  function startAckTimeout(cmd) {
    clearTimeout(ackTimeout);
    ackTimeout = setTimeout(() => {
      setFeedback('⚠️ No confirmation — tap again to retry', true);
      log('No ACK received for: ' + cmd);
    }, ACK_TIMEOUT_MS);
  }

  function clearAckTimeout() {
    clearTimeout(ackTimeout);
    ackTimeout = null;
  }

  // ── Notifications ─────────────────────────────────────────
  function handleNotification(event) {
    const msg = new TextDecoder().decode(event.target.value);
    log('← ' + msg);

    if (msg.startsWith('ACK:')) {
      clearAckTimeout();
      const cmd = msg.replace('ACK:', '');
      const labels = {
        'UNLOCK':    '🔓 Unlocked ✓',
        'LOCK':      '🔒 Locked ✓',
        'CLIMATE':   '❄️ Climate started ✓',
        'WHERE':     '📍 Location requested ✓',
        'VALET ON':  '🅿️ Valet mode ON ✓',
        'VALET OFF': '🅿️ Valet mode OFF ✓',
        'AUTO-LOCK': '🔒 Auto-locked ✓'
      };
      setFeedback(labels[cmd] || cmd + ' ✓');

      if (cmd === 'UNLOCK')    startCountdown();
      if (cmd === 'LOCK')      stopCountdown();
      if (cmd === 'AUTO-LOCK') stopCountdown();
    }

    else if (msg.startsWith('GPS:')) {
      if (msg === 'GPS:NOFIX') {
        setFeedback('No GPS fix yet — try again in a moment');
      } else {
        const coords = msg.replace('GPS:', '').split(',');
        if (coords.length === 2) {
          const lat = parseFloat(coords[0]);
          const lng = parseFloat(coords[1]);
          if (!isNaN(lat) && !isNaN(lng)) {
            setFeedback('Car located ✓');
            showMapLink(lat, lng);
          }
        }
      }
    }
  }

  // ── Valet toggle ──────────────────────────────────────────
  function toggleValet() {
    valetOn = !valetOn;
    const cmd = valetOn ? 'VALET ON' : 'VALET OFF';
    log('→ toggleValet sending: ' + cmd);
    const btn = document.getElementById('btnValet');
    if (valetOn) {
      btn.textContent      = '🅿️ Valet Mode: ON';
      btn.style.background = '#b45309';
    } else {
      btn.textContent      = '🅿️ Valet Mode: OFF';
      btn.style.background = '#0f766e';
    }
    send(cmd);
  }

  // ── BLE connection ────────────────────────────────────────
  async function connectToDevice() {
    const server  = await bleDevice.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);

    characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

    const notifyChar = await service.getCharacteristic(NOTIFY_UUID);
    await notifyChar.startNotifications();
    notifyChar.addEventListener('characteristicvaluechanged', handleNotification);

    setStatus('Connected ✓', 'connected');
    setButtons(true);
    reconnecting = false;
    document.getElementById('btnConnect').textContent = '🔵 Reconnect';
    startKeepalive();
    log('Connected to CarRemote');
  }

  async function reconnect() {
    if (reconnecting) return;
    reconnecting = true;
    stopKeepalive();
    let attempts = 0;

    while (attempts < 10) {
      try {
        setStatus(`Reconnecting... (${attempts + 1}/10)`, 'reconnecting');
        log('Reconnect attempt ' + (attempts + 1));
        await new Promise(r => setTimeout(r, 1500));
        await connectToDevice();
        log('Reconnected successfully');
        return;
      } catch (err) {
        attempts++;
        log('Attempt ' + attempts + ' failed: ' + err.message);
      }
    }

    setStatus('Disconnected', 'error');
    setButtons(false);
    characteristic = null;
    reconnecting   = false;
    log('Could not reconnect after 10 attempts');
  }

  async function connect() {
    try {
      setStatus('Scanning...', '');

      if (bleDevice && bleDevice.gatt.connected) {
        log('Already connected');
        return;
      }

      if (!bleDevice) {
        bleDevice = await navigator.bluetooth.requestDevice({
          filters: [{ name: 'CarRemote' }],
          optionalServices: [SERVICE_UUID]
        });

        bleDevice.addEventListener('gattserverdisconnected', () => {
          characteristic = null;
          stopKeepalive();
          stopCountdown();
          log('Connection lost — auto reconnecting');
          reconnect();
        });
      }

      await connectToDevice();

    } catch (err) {
      setStatus('Connection failed', 'error');
      log('Error: ' + err.message);
    }
  }

  // ── Send command ──────────────────────────────────────────
  async function send(cmd) {
    if (!characteristic) {
      setFeedback('Not connected');
      log('Send failed — not connected');
      return;
    }
    try {
      await characteristic.writeValue(new TextEncoder().encode(cmd));
      log('→ ' + cmd);
      if (CRITICAL_CMDS.includes(cmd)) {
        startAckTimeout(cmd);
      }
    } catch (err) {
      setFeedback('Failed to send');
      log('Send error: ' + err.message);
    }
  }
</script>

</body>
</html>
